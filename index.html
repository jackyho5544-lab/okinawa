<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e8a8a" />
  <title>沖繩自駕 2026 · 6人行</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='36' fill='%230e8a8a'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E%F0%9F%8F%96%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/style.css?v=10" />
</head>
<body>
  <header class="app-header">
    <div class="wrap">
      <h1 id="m-title">沖繩自駕 2026</h1>
      <p id="m-subtitle" class="subtitle">17–24 June · 3 對情侶 · 6 人</p>
      <p id="m-hotel" class="hotel"></p>
      <span id="data-source" class="badge">載入中…</span>
      <button id="me-chip" class="me-chip">👤 揀名</button>
    </div>
  </header>

  <main id="view" class="view">
    <p class="loading">載入緊行程…</p>
  </main>

  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-view="itinerary"><span>📅</span>行程</button>
    <button class="tab" data-view="stays"><span>🏨</span>住宿</button>
    <button class="tab" data-view="bookings"><span>✅</span>訂位</button>
    <button class="tab" data-view="expenses"><span>💰</span>夾數</button>
    <button class="tab" data-view="votes"><span>🗳️</span>投票</button>
    <button class="tab" data-view="packing"><span>🧳</span>執嘢</button>
    <button class="tab" data-view="board"><span>💬</span>留言</button>
    <button class="tab" data-view="phrases"><span>🗒️</span>用語</button>
  </nav>

  <script src="config.js?v=10"></script>
  <script src="assets/app.js?v=10"></script>
</body>
</html>
